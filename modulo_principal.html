<!DOCTYPE html>
<html>
<head>
    <title>Menú Principal - Visa</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: blue;
            margin-left: 15%;
            margin-right: 15%;
        }

        h1 {
            margin-top: 30px;
        }

        .contenedor {
            display: grid;
            grid-template-columns: repeat(3, 200px);
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
            background-color: rgb(204, 204, 240);
            
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.2);
            transition: 0.3s;
            margin-top: 20px;
            margin-bottom: 20px;
            margin-left: 20px;
            margin-right: 20px;
        }

        .card:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<h1>Solicitud de Visa</h1>

<div class="contenedor">

    <div class="card" onclick="location.href='modulo1.html'">
        <br>Información Personal
    </div>

    <div class="card" onclick="location.href='modulo2.html'">
        <br>Información de Contacto
    </div>

    <div class="card" onclick="location.href='modulo3.html'">
        <br>Información de Viaje
    </div>

    <div class="card" onclick="location.href='modulo4.html'">
        <br>Laboral / Académica
    </div>

    <div class="card" onclick="location.href='modulo5.html'">
        <br>Antecedentes
    </div>

</div>

</body>
</html>
